<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX AR Identity Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --primary: #008f39; 
            --glass: rgba(10, 10, 15, 0.65); 
        }

        body { 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            margin: 0; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }
        
        /* SLIDERS ULTRA FINOS */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 20; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: var(--primary); cursor: pointer; border: 2px solid #000;
            box-shadow: 0 0 8px var(--primary); margin-top: -6px; transition: transform 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.2); border-radius: 1px; }

        /* LAYOUT CORE */
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
        
        .ui-layer { position: absolute; bottom: 0; z-index: 10; width: 100%; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; pointer-events: none; padding-bottom: 25px;}
        .pointer-events-auto { pointer-events: auto !important; }

        /* BRANDING FIJO */
        #watermark {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 50; width: 100%; text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        #watermark h1 { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); margin-bottom: 2px; transition: color 0.3s;}
        #watermark p { font-size: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.8);}

        /* INICIALIZADOR DE PERMISOS */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,5,0.95); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); padding: 20px; pointer-events: auto; transition: opacity 0.4s;
        }

        /* PANEL INFERIOR COMPACTO */
        .sgx-panel { 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; 
            padding: 16px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* BOTONES DE TRIBU "PILLS" */
        .tribe-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .tribe-btn {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            font-size: 9px; font-weight: 800; cursor: pointer; color: #888;
            text-transform: uppercase; padding: 8px 0; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tribe-btn.active-uprm { border-color: #008f39; color: #008f39; background: rgba(0,143,57,0.1); box-shadow: 0 0 10px rgba(0,143,57,0.2); }
        .tribe-btn.active-inter { border-color: #FDCC0D; color: #FDCC0D; background: rgba(253,204,13,0.1); box-shadow: 0 0 10px rgba(253,204,13,0.2); }
        .tribe-btn.active-iupi { border-color: #cc0000; color: #cc0000; background: rgba(204,0,0,0.1); box-shadow: 0 0 10px rgba(204,0,0,0.2); }
        .tribe-btn.active-sagrado { border-color: #ff007f; color: #ff007f; background: rgba(255,0,127,0.1); box-shadow: 0 0 10px rgba(255,0,127,0.2); }

        /* BOTONES DE CÁMARA CIRCULARES */
        .cam-controls { display: flex; justify-content: space-evenly; align-items: center; margin-top: 10px; }
        
        .circle-btn {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; transition: transform 0.15s ease, background 0.3s ease;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        .circle-btn:active { transform: scale(0.9); }
        
        #btn-flip {
            width: 44px; height: 44px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
        }
        
        #btn-photo {
            width: 64px; height: 64px; background: #fff; border: 4px solid rgba(255,255,255,0.3); background-clip: padding-box;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        
        #btn-record {
            width: 54px; height: 54px; background: transparent; border: 3px solid var(--primary); color: var(--primary);
            position: relative;
        }
        #btn-record .rec-icon {
            width: 16px; height: 16px; background: var(--primary); border-radius: 50%; transition: all 0.3s ease;
        }
        #btn-record.recording .rec-icon {
            width: 14px; height: 14px; border-radius: 4px; background: #ff0055; 
        }
        #btn-record.recording { border-color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.4); }

        /* RECORDING INDICATOR */
        #rec-indicator { display: none; position: absolute; top: 25px; right: 25px; width: 10px; height: 10px; background: #ff0055; border-radius: 50%; box-shadow: 0 0 10px #ff0055; animation: pulse 1s infinite; z-index: 50; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="webgl-container">
        <video id="camera-feed" style="display: none;" autoplay playsinline muted></video>
        <canvas id="texture-canvas" style="display: none;"></canvas>
    </div>

    <div id="start-screen">
        <h1 class="cyber-font text-3xl text-center text-white mb-2 drop-shadow-lg">SGX STORY AR</h1>
        <p class="text-xs text-gray-400 text-center mb-8 tracking-widest uppercase">FILTRO DE IDENTIDAD TRIBAL</p>
        <button id="btn-init" class="w-full max-w-xs bg-white text-black font-black py-4 rounded-full uppercase tracking-widest hover:bg-gray-200 transition-transform active:scale-95">
            ACTIVAR CÁMARA
        </button>
        <p class="text-[9px] text-gray-500 mt-6 text-center uppercase tracking-widest">Requiere acceso a la cámara</p>
    </div>

    <div id="watermark" style="display: none;">
        <h1 id="tribe-label" class="cyber-font">SANGRE COLEGIO</h1>
        <p>Spatialgineers x Somos Mayagüez</p>
    </div>

    <div id="rec-indicator"></div>

    <div id="controls-ui" class="ui-layer px-4" style="display: none;">
        
        <div class="pointer-events-auto sgx-panel max-w-sm mx-auto w-full">
            
            <div class="tribe-grid">
                <button class="tribe-btn" id="btn-uprm" onclick="swapTribe('UPRM', '#008f39')">UPRM</button>
                <button class="tribe-btn" id="btn-inter" onclick="swapTribe('Inter', '#FDCC0D')">INTER</button>
                <button class="tribe-btn" id="btn-iupi" onclick="swapTribe('Iupi', '#cc0000')">IUPI</button>
                <button class="tribe-btn" id="btn-sagrado" onclick="swapTribe('Sagrado', '#ff007f')">SAGR</button>
            </div>

            <div class="grid grid-cols-2 gap-6 pb-2 mb-2 px-2">
                <div>
                    <div class="flex justify-between text-[8px] font-bold text-gray-400 mb-1 tracking-wider"><label>TINT</label></div>
                    <input type="range" id="sl-int" min="0" max="1" step="0.05" value="0.8">
                </div>
                <div>
                    <div class="flex justify-between text-[8px] font-bold text-gray-400 mb-1 tracking-wider"><label>GRID</label></div>
                    <input type="range" id="sl-scale" min="0.0" max="1" step="0.05" value="0.5">
                </div>
            </div>

            <div class="cam-controls">
                <button id="btn-flip" class="circle-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 16V14a2 2 0 0 0-2-2h-8"></path>
                        <path d="M14 16l-4-4 4-4"></path>
                        <path d="M4 8v2a2 2 0 0 0 2 2h8"></path>
                        <path d="M10 8l4 4-4 4"></path>
                    </svg>
                </button>

                <button id="btn-photo" class="circle-btn"></button>

                <button id="btn-record" class="circle-btn">
                    <div class="rec-icon"></div> 
                </button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const texCanvas = document.getElementById('texture-canvas');
        const texCtx = texCanvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('webgl-container');
        
        let isStreamActive = false;
        let currentFacingMode = 'user'; 

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16)/255, g: parseInt(result[2], 16)/255, b: parseInt(result[3], 16)/255 } : { r:1, g:1, b:1 };
        }

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const videoTexture = new THREE.CanvasTexture(texCanvas);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        function resize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            if(shaderMat) shaderMat.uniforms.u_resolution.value.set(width, height);
        }
        window.addEventListener('resize', resize);

        const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;

        const fragmentShader = `
            uniform sampler2D tDiffuse;
            uniform float u_intensity;
            uniform float u_grid;
            uniform vec2 u_resolution;
            uniform float u_flip;
            uniform vec3 u_tint_color;

            varying vec2 vUv;

            float getLuma(vec3 color) { return dot(color, vec3(0.299, 0.587, 0.114)); }
            
            vec3 rgbSplit(sampler2D tex, vec2 uv, float splitAmount) {
                float r = texture2D(tex, vec2(uv.x + splitAmount, uv.y)).r;
                float g = texture2D(tex, uv).g;
                float b = texture2D(tex, vec2(uv.x - splitAmount, uv.y)).b;
                return vec3(r, g, b);
            }

            void main() {
                vec2 uv = vUv;
                if(u_flip > 0.5) uv.x = 1.0 - uv.x;

                vec3 finalColor = rgbSplit(tDiffuse, uv, 0.005 * u_intensity);
                finalColor = (finalColor - 0.5) * (1.0 + 0.4 * u_intensity) + 0.5;
                
                float luma = getLuma(finalColor);
                vec3 tribalTint = mix(finalColor, finalColor * u_tint_color * 2.5, u_intensity);
                finalColor = mix(tribalTint, finalColor, smoothstep(0.6, 1.0, luma));

                if (u_grid > 0.0) {
                    vec2 aspectUv = uv;
                    aspectUv.x *= u_resolution.x / u_resolution.y; 
                    vec2 gridUv = aspectUv * 150.0; 
                    vec2 cellCenter = fract(gridUv) - 0.5; 
                    float dotGrid = 1.0 - step(0.12 * u_grid, length(cellCenter));
                    
                    vec2 texel = (1.0 / u_resolution) * 2.0;
                    float s00 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1, -1)).rgb);
                    float s22 = getLuma(texture2D(tDiffuse, uv + texel * vec2(1, 1)).rgb);
                    float s02 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1, 1)).rgb);
                    float s20 = getLuma(texture2D(tDiffuse, uv + vec2(1, -1)).rgb);
                    float edge = abs(s00 - s22) + abs(s02 - s20);
                    
                    vec3 arGlow = u_tint_color * edge * 4.0 * u_grid; 
                    finalColor = mix(finalColor, finalColor + arGlow + (u_tint_color * dotGrid * 0.5), u_grid * 0.5);
                }

                gl_FragColor = vec4(clamp(finalColor, 0.0, 1.0), 1.0);
            }
        `;

        const shaderMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTexture },
                u_intensity: { value: 0.8 },
                u_grid: { value: 0.5 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_flip: { value: 1.0 }, 
                u_tint_color: { value: new THREE.Vector3(0, 1, 0) } 
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMat));

        let currentStream = null;

        // INICIALIZACIÓN DE CÁMARA (Event Handler del Botón)
        document.getElementById('btn-init').addEventListener('click', () => {
            document.getElementById('btn-init').innerText = "CONECTANDO...";
            startCamera(true); // Pasamos 'true' para indicar que es el arranque inicial
        });

        async function startCamera(isInitialBoot = false) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                
                currentStream = stream;
                video.srcObject = stream;
                
                // MATA LA FRICCIÓN ASÍNCRONA: Ejecuta el play sin congelar el hilo principal
                video.play().catch(e => console.warn("Video play info:", e));
                
                video.onloadedmetadata = () => {
                    texCanvas.width = video.videoWidth;
                    texCanvas.height = video.videoHeight;
                    
                    shaderMat.uniforms.u_flip.value = (currentFacingMode === 'user') ? 1.0 : 0.0;
                    resize();
                    
                    if (!isStreamActive) {
                        isStreamActive = true;
                        drawFrame();
                    }

                    // SOLO DESTRUYE LA PANTALLA SI ES EL BOOT INICIAL
                    if (isInitialBoot) {
                        document.getElementById('start-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('start-screen').style.display = 'none';
                            
                            document.getElementById('controls-ui').style.display = 'flex';
                            document.getElementById('watermark').style.display = 'block';
                            
                            swapTribe('UPRM', '#008f39');
                        }, 400);
                    }
                };
            } catch (err) {
                console.error(err);
                alert("Error al acceder a la cámara. Asegúrate de dar los permisos correspondientes.");
                document.getElementById('btn-init').innerText = "REINTENTAR";
            }
        }

        function drawFrame() {
            if (!isStreamActive) return;
            requestAnimationFrame(drawFrame);

            if (video.readyState >= video.HAVE_CURRENT_DATA) {
                texCtx.drawImage(video, 0, 0, texCanvas.width, texCanvas.height);
                videoTexture.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }

        function swapTribe(id, hexColor) {
            document.documentElement.style.setProperty('--primary', hexColor);
            document.getElementById('tribe-label').innerText = "SANGRE " + id.toUpperCase();
            
            const c = hexToRgb(hexColor);
            shaderMat.uniforms.u_tint_color.value.set(c.r, c.g, c.b);

            document.querySelectorAll('.tribe-btn').forEach(btn => {
                btn.className = "tribe-btn"; 
            });
            document.getElementById('btn-' + id.toLowerCase()).classList.add('active-' + id.toLowerCase());
        }

        // --- CONTROLES Y CAPTURA ---
        document.getElementById('btn-flip').addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera(false); // Pasamos 'false' porque el UI ya está activo
        });

        document.getElementById('sl-int').addEventListener('input', (e) => shaderMat.uniforms.u_intensity.value = parseFloat(e.target.value));
        document.getElementById('sl-scale').addEventListener('input', (e) => shaderMat.uniforms.u_grid.value = parseFloat(e.target.value));

        // FOTO
        document.getElementById('btn-photo').addEventListener('click', () => {
            renderer.render(scene, camera);
            const dataURL = renderer.domElement.toDataURL('image/jpeg', 0.9);
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `SGX_Sangre_${Date.now()}.jpg`;
            a.click();
            
            // Flash Effect
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;z-index:9999;transition:opacity 0.3s;opacity:1;pointer-events:none;';
            document.body.appendChild(flash);
            setTimeout(() => flash.style.opacity = '0', 50);
            setTimeout(() => document.body.removeChild(flash), 350);
        });

        // GRABACIÓN DE VIDEO 
        let mediaRecorder;
        let recordedChunks = [];
        const btnRecord = document.getElementById('btn-record');
        
        btnRecord.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                btnRecord.classList.remove('recording'); 
                document.getElementById('rec-indicator').style.display = 'none';
                return;
            }

            recordedChunks = [];
            const stream = renderer.domElement.captureStream(30);
            let mimeType = 'video/mp4';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm; codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
            }

            mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `SGX_AR_Video.webm`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
            };

            mediaRecorder.start();
            
            btnRecord.classList.add('recording'); 
            document.getElementById('rec-indicator').style.display = 'block';
        });

        resize();
    </script>
</body>
</html>

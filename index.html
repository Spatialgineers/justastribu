<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Representa tu Tribu </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --primary: #008f39; 
            --dark: #121212;
            --text: #f4f4f4;
            --glass: rgba(10, 10, 12, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

        body { 
            background-color: #050505; 
            color: var(--text); 
            overflow: hidden; 
            display: flex; justify-content: center;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }
        
        #render-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        #webgl-canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
        
        /* Ocultos según referencia */
        #camera-feed { display: none; }
        #texture-canvas { display: none; }

        .hub-header {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            text-align: center; z-index: 100; pointer-events: none;
        }
        .hub-header h1 { font-size: 22px; margin: 0; text-shadow: 0 2px 10px var(--primary); transition: text-shadow 0.3s; }

        .hub-footer {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            text-align: center; z-index: 100; font-size: 10px; color: #888;
            font-weight: bold; letter-spacing: 1px; text-transform: uppercase; pointer-events: none;
        }
        .hub-footer span { color: var(--primary); transition: color 0.3s; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 20px;
            pointer-events: auto; transition: opacity 0.4s;
        }

        .action-btn { 
            width: 100%; max-width: 320px; padding: 18px; margin-top: 10px; 
            background: transparent; border: 2px solid var(--primary); color: var(--primary); 
            border-radius: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; 
            cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(0,0,0,0.5); 
        }
        .action-btn.fill { 
            background: var(--primary); color: #000; border: none; box-shadow: 0 0 20px rgba(0,143,57,0.4); 
            transition: background 0.3s, box-shadow 0.3s;
        }
        .action-btn:active { transform: scale(0.96); }

        .arcade-board {
            background: rgba(0,0,0,0.8); border: 2px solid var(--primary);
            border-radius: 16px; padding: 20px; width: 100%; max-width: 350px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,143,57,0.2);
            display: flex; flex-direction: column; transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(10px); pointer-events: auto;
        }

        .ui-layer { position: absolute; bottom: 0; z-index: 10; width: 100%; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; pointer-events: none; padding-bottom: 25px;}

        .tribe-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .tribe-btn {
            background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1); border-radius: 8px;
            font-size: 10px; font-weight: 900; cursor: pointer; color: #aaa;
            text-transform: uppercase; padding: 12px 0; transition: 0.2s;
            backdrop-filter: blur(5px);
        }
        .tribe-btn:active { transform: scale(0.96); }
        .tribe-btn.active-uprm { border-color: #008f39; color: #008f39; box-shadow: 0 0 10px rgba(0,143,57,0.3); background: rgba(0,143,57,0.1); }
        .tribe-btn.active-inter { border-color: #FDCC0D; color: #FDCC0D; box-shadow: 0 0 10px rgba(253,204,13,0.3); background: rgba(253,204,13,0.1); }
        .tribe-btn.active-iupi { border-color: #cc0000; color: #cc0000; box-shadow: 0 0 10px rgba(204,0,0,0.3); background: rgba(204,0,0,0.1); }
        .tribe-btn.active-sagrado { border-color: #ff007f; color: #ff007f; box-shadow: 0 0 10px rgba(255,0,127,0.3); background: rgba(255,0,127,0.1); }
        .tribe-btn.active-uagm { border-color: #FF6600; color: #FF6600; box-shadow: 0 0 10px rgba(255,102,0,0.3); background: rgba(255,102,0,0.1); }
        .tribe-btn.active-pucpr { border-color: #0033A0; color: #0033A0; box-shadow: 0 0 10px rgba(0,51,160,0.3); background: rgba(0,51,160,0.1); }
        .tribe-btn.active-uprb { border-color: #00BFFF; color: #00BFFF; box-shadow: 0 0 10px rgba(0,191,255,0.3); background: rgba(0,191,255,0.1); }
        .tribe-btn.active-uprp { border-color: #8B0000; color: #8B0000; box-shadow: 0 0 10px rgba(139,0,0,0.3); background: rgba(139,0,0,0.1); }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 20; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: var(--primary); cursor: pointer; border: 2px solid #000;
            box-shadow: 0 0 8px var(--primary); margin-top: -6px; transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.2); border-radius: 1px; }

        .cam-controls { display: flex; justify-content: space-evenly; align-items: center; margin-top: 10px; }
        .circle-btn {
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; transition: transform 0.15s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        .circle-btn:active { transform: scale(0.9); }
        
        #btn-flip { width: 44px; height: 44px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        #btn-photo { width: 64px; height: 64px; background: #fff; border: 4px solid rgba(255,255,255,0.3); background-clip: padding-box; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        
        #btn-record { width: 54px; height: 54px; background: transparent; border: 3px solid var(--primary); color: var(--primary); position: relative; }
        #btn-record .rec-icon { width: 16px; height: 16px; background: var(--primary); border-radius: 50%; transition: all 0.3s ease; }
        #btn-record.recording .rec-icon { width: 14px; height: 14px; border-radius: 4px; background: #ff0055; }
        #btn-record.recording { border-color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.4); }

        #rec-indicator { display: none; position: absolute; top: 25px; right: 25px; width: 10px; height: 10px; background: #ff0055; border-radius: 50%; box-shadow: 0 0 10px #ff0055; animation: pulse 1s infinite; z-index: 50; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="texture-canvas"></canvas>
    
    <div id="render-container"></div>

    <div id="start-screen">
        <div class="hub-header"><h1 class="cyber-font">SGX Justas</h1></div>
        <h1 class="cyber-font" style="font-size: 28px; text-transform: uppercase; color: var(--primary); margin-bottom: 5px; text-align: center; letter-spacing: 1px; transition: color 0.3s;">Filtro AR</h1>
        <p style="color: #aaa; margin-bottom: 30px; font-size: 13px; text-align: center; line-height: 1.5;">Selecciona tu tribu y activa la cámara</p>
        <button id="btn-init" class="action-btn fill">ACTIVAR CÁMARA</button>
        <p style="font-size: 10px; color: #555; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; text-align: center;">Requiere acceso a micrófono y cámara</p>
        <div class="hub-footer">Powered by <span>Spatialgineers</span><br>in collaboration with <span>Somos Mayagüez</span></div>
    </div>

    <div id="rec-indicator"></div>

    <div id="controls-ui" class="ui-layer px-4" style="display: none;">
        <div class="arcade-board mx-auto w-full">
            <div class="tribe-grid">
                <button class="tribe-btn" id="btn-uprm" onclick="swapTribe('UPRM', '#008f39')">UPRM</button>
                <button class="tribe-btn" id="btn-inter" onclick="swapTribe('Inter', '#FDCC0D')">INTER</button>
                <button class="tribe-btn" id="btn-iupi" onclick="swapTribe('Iupi', '#cc0000')">IUPI</button>
                <button class="tribe-btn" id="btn-sagrado" onclick="swapTribe('Sagrado', '#ff007f')">SAGR</button>
                <button class="tribe-btn" id="btn-uagm" onclick="swapTribe('UAGM', '#FF6600')">UAGM</button>
                <button class="tribe-btn" id="btn-pucpr" onclick="swapTribe('PUCPR', '#0033A0')">PUCPR</button>
                <button class="tribe-btn" id="btn-uprb" onclick="swapTribe('UPRB', '#00BFFF')">UPRB</button>
                <button class="tribe-btn" id="btn-uprp" onclick="swapTribe('UPRP', '#8B0000')">UPRP</button>
            </div>

            <div class="grid grid-cols-2 gap-6 pb-2 mb-2 px-2">
                <div>
                    <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-1 tracking-wider uppercase"><label>TINT</label></div>
                    <input type="range" id="sl-int" min="0" max="1" step="0.05" value="0.8">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-1 tracking-wider uppercase"><label>NEON</label></div>
                    <input type="range" id="sl-scale" min="0.0" max="1" step="0.05" value="0.7">
                </div>
            </div>

            <div class="cam-controls">
                <button id="btn-flip" class="circle-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 16V14a2 2 0 0 0-2-2h-8"></path><path d="M14 16l-4-4 4-4"></path><path d="M4 8v2a2 2 0 0 0 2 2h8"></path><path d="M10 8l4 4-4 4"></path></svg>
                </button>
                <button id="btn-photo" class="circle-btn"></button>
                <button id="btn-record" class="circle-btn"><div class="rec-icon"></div></button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CORE DOM ---
        const video = document.getElementById('camera-feed');
        const texCanvas = document.getElementById('texture-canvas');
        const texCtx = texCanvas.getContext('2d', { willReadFrequently: true });
        const renderContainer = document.getElementById('render-container');
        
        let isStreamActive = false;
        let currentFacingMode = 'user'; 
        let audioStream = null; 

        let currentTribeName = "COLEGIO";
        let currentTribeColorHex = "#008f39";

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16)/255, g: parseInt(result[2], 16)/255, b: parseInt(result[3], 16)/255 } : { r:1, g:1, b:1 };
        }

        // --- 2. UBERSHADER SETUP (Igual al de referencia) ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.domElement.id = 'webgl-canvas';
        renderContainer.appendChild(renderer.domElement);

        const videoTexture = new THREE.CanvasTexture(texCanvas);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // --- 3. NUEVO SISTEMA DE WATERMARK EN GPU ---
        // Dibujamos el texto en un canvas invisible y lo metemos como textura 3D
        const wmCanvas = document.createElement('canvas');
        const wmCtx = wmCanvas.getContext('2d', { alpha: true });
        const wmTexture = new THREE.CanvasTexture(wmCanvas);
        wmTexture.minFilter = THREE.LinearFilter;
        wmTexture.magFilter = THREE.LinearFilter;
        
        // Colocamos el texto frente a la cámara (Z=0.1)
        const wmMaterial = new THREE.MeshBasicMaterial({ map: wmTexture, transparent: true });
        const wmMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), wmMaterial);
        wmMesh.position.z = 0.1; 
        scene.add(wmMesh);

        function updateWatermark() {
            if(wmCanvas.width === 0) return;
            wmCtx.clearRect(0, 0, wmCanvas.width, wmCanvas.height);
            wmCtx.textAlign = "center";
            
            // Texto escalado a la resolución nativa de la ventana
            let w = wmCanvas.width;
            let baseSize = w * 0.055;
            let topOffset = baseSize * 2.5;

            // Sombra y estilo del texto
            wmCtx.shadowColor = "rgba(0,0,0,0.9)";
            wmCtx.shadowBlur = baseSize * 0.4;
            wmCtx.shadowOffsetY = baseSize * 0.1;
            
            // SANGRE TRIBU
            wmCtx.font = `900 ${baseSize}px 'Orbitron', sans-serif`;
            wmCtx.fillStyle = currentTribeColorHex;
            wmCtx.fillText("SANGRE " + currentTribeName, w / 2, topOffset);

            // Subtitulo más pequeño en 2 líneas para que no se salga de pantalla
            let subSize = w * 0.025; 
            wmCtx.font = `bold ${subSize}px sans-serif`;
            wmCtx.fillStyle = "rgba(255,255,255,0.9)";
            wmCtx.shadowBlur = baseSize * 0.2; 
            
            wmCtx.fillText("SGX JUSTAS CHALLENGE", w / 2, topOffset + subSize * 1.8);
            wmCtx.fillText("Spatialgineers x Somos Mayagüez", w / 2, topOffset + subSize * 3.2);

            wmTexture.needsUpdate = true;
        }

        function resize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height); 
            
            // Ajustamos el canvas del watermark a la resolución de la pantalla
            wmCanvas.width = width;
            wmCanvas.height = height;
            
            if(shaderMat) shaderMat.uniforms.u_resolution.value.set(width, height);
            
            updateWatermark();
        }
        window.addEventListener('resize', resize);

        const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;

        const fragmentShader = `
            uniform sampler2D tDiffuse;
            uniform float u_intensity;
            uniform float u_grid; 
            uniform vec2 u_resolution;
            uniform float u_flip;
            uniform vec3 u_tint_color;
            varying vec2 vUv;

            float getLuma(vec3 color) { return dot(color, vec3(0.299, 0.587, 0.114)); }
            
            vec3 rgbSplit(sampler2D tex, vec2 uv, float splitAmount) {
                float r = texture2D(tex, vec2(uv.x + splitAmount, uv.y)).r;
                float g = texture2D(tex, uv).g;
                float b = texture2D(tex, vec2(uv.x - splitAmount, uv.y)).b;
                return vec3(r, g, b);
            }

            void main() {
                vec2 uv = vUv;
                if(u_flip > 0.5) uv.x = 1.0 - uv.x;

                vec3 finalColor = rgbSplit(tDiffuse, uv, 0.005 * u_intensity);
                finalColor = (finalColor - 0.5) * (1.0 + 0.4 * u_intensity) + 0.5;
                
                float luma = getLuma(finalColor);
                vec3 tribalTint = mix(finalColor, finalColor * u_tint_color * 2.5, u_intensity);
                finalColor = mix(tribalTint, finalColor, smoothstep(0.6, 1.0, luma));

                // 4-Tap Diet Sobel (Extremadamente liviano para el GPU)
                if (u_grid > 0.0) {
                    vec2 texel = 2.0 / u_resolution; 
                    
                    float l1 = getLuma(texture2D(tDiffuse, uv + vec2(-texel.x, -texel.y)).rgb);
                    float l2 = getLuma(texture2D(tDiffuse, uv + vec2( texel.x, -texel.y)).rgb);
                    float l3 = getLuma(texture2D(tDiffuse, uv + vec2(-texel.x,  texel.y)).rgb);
                    float l4 = getLuma(texture2D(tDiffuse, uv + vec2( texel.x,  texel.y)).rgb);

                    float edge = sqrt(pow(l1 - l4, 2.0) + pow(l2 - l3, 2.0)) * 2.0;
                    vec3 neonGlow = u_tint_color * edge * 3.5 * u_grid; 
                    finalColor += neonGlow;
                }
                gl_FragColor = vec4(clamp(finalColor, 0.0, 1.0), 1.0);
            }
        `;

        const shaderMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTexture },
                u_intensity: { value: 0.8 },
                u_grid: { value: 0.7 }, 
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_flip: { value: 1.0 }, 
                u_tint_color: { value: new THREE.Vector3(0, 1, 0) } 
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader
        });

        // El video siempre está detrás (Z=0)
        const videoMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), shaderMat);
        scene.add(videoMesh);

        let currentStream = null;

        document.getElementById('btn-init').addEventListener('click', () => {
            document.getElementById('btn-init').innerText = "CONECTANDO...";
            startCamera(true); 
        });

        async function startCamera(isInitialBoot = false) {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }

            try {
                // Resolución idéntica al app de Story Time (720p)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                
                currentStream = stream;
                video.srcObject = stream;
                
                if (stream.getAudioTracks().length > 0) {
                    audioStream = new MediaStream([stream.getAudioTracks()[0]]);
                }
                
                video.play().catch(e => console.warn("Autoplay bloqueado:", e));
                
                video.onloadedmetadata = () => {
                    texCanvas.width = video.videoWidth;
                    texCanvas.height = video.videoHeight;
                    
                    shaderMat.uniforms.u_flip.value = (currentFacingMode === 'user') ? 1.0 : 0.0;
                    
                    if (!isStreamActive) {
                        isStreamActive = true;
                        drawFrame();
                    }
                    
                    resize();

                    if (isInitialBoot) {
                        document.getElementById('start-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('start-screen').style.display = 'none';
                            document.getElementById('controls-ui').style.display = 'flex';
                            swapTribe('UPRM', '#008f39');
                        }, 400);
                    }
                };
            } catch (err) {
                console.error(err);
                alert("Error crítico. Permite acceso al Micrófono y Cámara en tu navegador.");
                document.getElementById('btn-init').innerText = "REINTENTAR";
            }
        }

        // Loop súper liviano (Igual a la referencia)
        function drawFrame() {
            if (!isStreamActive) return;
            requestAnimationFrame(drawFrame);

            if (video.readyState >= video.HAVE_CURRENT_DATA) {
                texCtx.drawImage(video, 0, 0, texCanvas.width, texCanvas.height);
                videoTexture.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        function swapTribe(id, hexColor) {
            currentTribeName = id.toUpperCase();
            currentTribeColorHex = hexColor;

            document.documentElement.style.setProperty('--primary', hexColor);
            
            const board = document.querySelector('.arcade-board');
            if(board) board.style.boxShadow = `0 0 30px rgba(0,0,0,0.8), inset 0 0 20px ${hexColor}33`; 
            
            const c = hexToRgb(hexColor);
            shaderMat.uniforms.u_tint_color.value.set(c.r, c.g, c.b);

            document.querySelectorAll('.tribe-btn').forEach(btn => btn.className = "tribe-btn");
            document.getElementById('btn-' + id.toLowerCase()).classList.add('active-' + id.toLowerCase());

            updateWatermark();
        }

        document.getElementById('btn-flip').addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera(false); 
        });

        document.getElementById('sl-int').addEventListener('input', (e) => shaderMat.uniforms.u_intensity.value = parseFloat(e.target.value));
        document.getElementById('sl-scale').addEventListener('input', (e) => shaderMat.uniforms.u_grid.value = parseFloat(e.target.value));

        // EXPORT: Foto directa del GPU (ya tiene el texto quemado arriba)
        document.getElementById('btn-photo').addEventListener('click', () => {
            renderer.render(scene, camera); 
            
            const dataURL = renderer.domElement.toDataURL('image/jpeg', 0.95);
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `SGX_Sangre_${currentTribeName}_${Date.now()}.jpg`;
            a.click();
            
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;z-index:9999;transition:opacity 0.3s;opacity:1;pointer-events:none;';
            document.body.appendChild(flash);
            setTimeout(() => flash.style.opacity = '0', 50);
            setTimeout(() => document.body.removeChild(flash), 350);
        });

        // GRABACIÓN DIRECTA DE WEBGL: Cero estrés al CPU (Igual al Story Time)
        let mediaRecorder;
        let recordedChunks = [];
        const btnRecord = document.getElementById('btn-record');
        
        btnRecord.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                btnRecord.classList.remove('recording'); 
                document.getElementById('rec-indicator').style.display = 'none';
                return;
            }

            recordedChunks = [];
            // Aquí está la magia: capturamos el GPU, sin exportCanvas
            const visualStream = renderer.domElement.captureStream(30);
            
            let combinedStream = visualStream;
            if (audioStream) {
                combinedStream = new MediaStream([
                    ...visualStream.getVideoTracks(),
                    ...audioStream.getAudioTracks()
                ]);
            }

            let mimeType = 'video/mp4'; 
            let fileExt = 'mp4';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm; codecs=vp9'; 
                fileExt = 'webm'; 
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm'; 
            }

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: mimeType });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `SGX_AR_Video_${currentTribeName}.${fileExt}`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
            };

            mediaRecorder.start();
            btnRecord.classList.add('recording'); 
            document.getElementById('rec-indicator').style.display = 'block';
        });

        resize();
    </script>
</body>
</html>
